id: source-map-exposure
info:
  name: JavaScript Source Map Exposure
  author: atomic-framework
  severity: medium
  description: Detects exposed JavaScript source map files (.js.map) that reveal original unminified source code, internal paths, and potentially sensitive logic.
  tags: exposure,javascript,sourcemap
  classification:
    cwe-id: CWE-540

http:
  - method: GET
    path:
      - "{{BaseURL}}/main.js.map"
      - "{{BaseURL}}/app.js.map"
      - "{{BaseURL}}/bundle.js.map"
      - "{{BaseURL}}/vendor.js.map"
      - "{{BaseURL}}/runtime.js.map"
      - "{{BaseURL}}/static/js/main.js.map"
      - "{{BaseURL}}/assets/js/app.js.map"

    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: word
        words:
          - '"sources"'
          - '"mappings"'
          - '"sourceRoot"'
        condition: or

      - type: word
        words:
          - '"version"'

      - type: status
        status:
          - 200

id: open-redirect-detection
info:
  name: Open Redirect Detection
  author: atomic-framework
  severity: medium
  description: Detects open redirect vulnerabilities in common URL parameters.
  tags: redirect,vulnerability
  classification:
    cwe-id: CWE-601
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:R/S:C/C:L/I:L/A:N
    cvss-score: 6.1

http:
  - method: GET
    path:
      - "{{BaseURL}}/?redirect=https://evil.com"
      - "{{BaseURL}}/?url=https://evil.com"
      - "{{BaseURL}}/?next=https://evil.com"
      - "{{BaseURL}}/?return_url=https://evil.com"
      - "{{BaseURL}}/?redirect_uri=https://evil.com"
      - "{{BaseURL}}/?goto=https://evil.com"
      - "{{BaseURL}}/?continue=https://evil.com"
      - "{{BaseURL}}/login?redirect=https://evil.com"

    stop-at-first-match: true
    max-redirects: 0
    matchers-condition: or
    matchers:
      - type: regex
        part: header
        regex:
          - "(?i)location:\\s*https?://evil\\.com"

      - type: word
        part: header
        words:
          - "evil.com"

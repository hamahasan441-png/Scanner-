name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  lint-and-validate:
    name: Lint & Validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest pytest-cov

      - name: Python syntax validation
        run: |
          echo "Validating Python syntax across all modules..."
          python -m py_compile main.py
          python -m py_compile config.py
          for dir in core modules utils web scanner; do
            if [ -d "$dir" ]; then
              find "$dir" -name '*.py' -exec python -m py_compile {} +
            fi
          done
          echo "All files passed syntax validation."

      - name: Module import validation
        run: |
          echo "Validating core imports..."
          python -c "from core.engine import AtomicEngine"
          python -c "from core.banner import print_banner"
          python -c "from core.reporter import ReportGenerator"
          python -c "from config import Config, Payloads, Colors"
          echo "Validating module imports..."
          python -c "from modules.sqli import SQLiModule"
          python -c "from modules.xss import XSSModule"
          python -c "from modules.lfi import LFIModule"
          python -c "from modules.cmdi import CommandInjectionModule"
          python -c "from modules.ssrf import SSRFModule"
          python -c "from modules.ssti import SSTIModule"
          python -c "from modules.xxe import XXEModule"
          python -c "from modules.idor import IDORModule"
          python -c "from modules.nosqli import NoSQLModule"
          python -c "from modules.cors import CORSModule"
          python -c "from modules.jwt import JWTModule"
          python -c "from modules.uploader import ShellUploader"
          python -c "from modules.waf import WAFBypass"
          python -c "from modules.dumper import DataDumper"
          python -c "from modules.reconnaissance import ReconModule"
          python -c "from modules.graphql import GraphQLModule"
          python -c "from modules.proto_pollution import ProtoPollutionModule"
          echo "Validating Scapy crawler imports..."
          python -c "from modules.scapy_crawler import ScapyCrawler, is_scapy_available"
          python -c "from modules.scapy_crawler import StealthPortScanner"
          python -c "from modules.scapy_crawler import ARPNetworkDiscovery"
          python -c "from modules.scapy_crawler import DNSReconScanner"
          python -c "from modules.scapy_crawler import ScapyVulnScanner, SCAPY_VULN_DB"
          python -c "from modules.scapy_crawler import ScapyAttackChain, NETWORK_CHAIN_TEMPLATES"
          echo "Validating scanner module imports..."
          python -c "from scanner.vuln_scanner import VulnScanner, WAFDetector, WAFBypassEngine"
          python -c "from scanner.vuln_scanner import SQLiTester, XSSTester, LFITester, CMDiTester"
          python -c "from scanner.vuln_scanner import SSRFTester, SSTITester, OpenRedirectTester"
          python -c "from scanner.vuln_scanner import ScanFinding, format_findings"
          echo "Validating utility imports..."
          python -c "from utils.requester import Requester"
          python -c "from utils.crawler import Crawler"
          python -c "from utils.evasion import EvasionEngine"
          python -c "from utils.helpers import check_dependencies"
          python -c "from utils.database import Database"
          echo "All imports validated successfully."

      - name: Lint with flake8
        run: |
          # Stop on syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warn on style issues (non-blocking)
          flake8 . --count --exit-zero --max-complexity=15 --max-line-length=150 --statistics

      - name: Run unit tests
        run: |
          python -m pytest tests/ -v --tb=short --ignore=tests/integration

      - name: Run integration tests
        run: |
          python -m pytest tests/integration/ -v --tb=short

  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit pip-audit

      - name: Run Bandit security linter
        run: |
          bandit -r core/ modules/ utils/ web/ scanner/ -ll --exit-zero -f json -o bandit-report.json
          bandit -r core/ modules/ utils/ web/ scanner/ -ll --exit-zero

      - name: Run pip-audit dependency check
        run: |
          pip-audit --strict --exit-zero || true

      - name: Dependency version sync check
        run: |
          echo "Checking requirements.txt and pyproject.toml are in sync..."
          python -c "
          import re, sys
          # Parse requirements.txt
          req_deps = {}
          with open('requirements.txt') as f:
              for line in f:
                  line = line.strip()
                  if line and not line.startswith('#'):
                      m = re.match(r'([a-zA-Z0-9_-]+)==(.+)', line)
                      if m:
                          req_deps[m.group(1).lower()] = m.group(2)
          # Parse pyproject.toml dependencies
          toml_deps = {}
          with open('pyproject.toml') as f:
              in_deps = False
              for line in f:
                  if 'dependencies' in line and '=' in line and '[' not in line:
                      continue
                  if in_deps:
                      if ']' in line:
                          break
                      m = re.search(r'\"([a-zA-Z0-9_-]+)==(.+?)\"', line)
                      if m:
                          toml_deps[m.group(1).lower()] = m.group(2)
                  if line.strip().startswith('dependencies = ['):
                      in_deps = True
          mismatches = []
          for pkg, ver in req_deps.items():
              if pkg in toml_deps and toml_deps[pkg] != ver:
                  mismatches.append(f'{pkg}: requirements.txt={ver} vs pyproject.toml={toml_deps[pkg]}')
          if mismatches:
              print('Version mismatches found:')
              for m in mismatches:
                  print(f'  - {m}')
              sys.exit(1)
          print('All dependency versions are in sync.')
          "
